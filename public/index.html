<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      rel="preload"
      href="fonts/inter-v7-latin_cyrillic-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="css/index.css" />
    <script type="module" src="index.js" defer></script>

    <title>CMS ShopOnLine</title>
  </head>

  <body>
    <section class="authorization">
      <div class="container">
        <div class="autch">
          <span class="autch__name"></span>
          <button class="button-ui_exit">Выйти</button>
          <form class="panel__autch">
            <label class="label__password">
              <input
                type="password"
                name="password"
                class="password"
                placeholder="введите пароль"
              />
              <span class="text-warning">Неверный пароль</span>
            </label>
            <label>
              <input type="checkbox" id="remember" class="remember" /> запомнить
            </label>
            <button class="button-ui_form">Войти</button>
          </form>
          <button class="autch__btn"></button>
        </div>
      </div>
    </section>
    <section class="cms">
      <div class="container">
        <header class="cms__header">
          <h1 class="cms__title">CMS - ShopOnline</h1>

          <p class="cms__total">
            <span class="cms__total-text"></span>
            <span class="cms__total-price"></span>
          </p>
        </header>

        <div class="cms__goods goods">
          <div class="goods__panel panel">
            <form class="panel__search">
              <input
                id="search"
                type="search"
                class="panel__input"
                placeholder="Поиск по наименованию"
              />
            </form>
            <div class="panel__filter">
              <div class="panel__filter_block">
                <span class="filter__title">Категория</span>
                <select id="category_filter" class="filter__category"></select>
              </div>
              <div class="panel__filter_block block__filter_discount">
                <span class="filter__title">Дисконт</span>
                <input
                  id="discount_filter"
                  class="filter__discount"
                  type="checkbox"
                  name="discount"
                />
              </div>
              <div
                class="panel__filter_block panel__filter_inwork visually-hidden"
              >
                <span class="filter__title">Статус</span>
                <select id="inwork_filter" class="filter__inwork">
                  <option value="-1">все товары</option>
                  <option value="0">продажа</option>
                  <option value="1">оформление</option>
                </select>
              </div>
            </div>
            <button class="panel__add-goods visually-hidden">
              Добавить товар
            </button>
          </div>
          <div class="goods__table-wrapper">
            <table class="goods__table table">
              <thead class="table__header">
                <tr class="table__header-row">
                  <th class="table__header-cell">№</th>
                  <th
                    class="table__header-cell table__header-inwork visually-hidden"
                  >
                    Статус
                  </th>
                  <th class="table__header-cell table__header-cell_left">
                    Наименование
                  </th>
                  <th class="table__header-cell table__header-cell_left">
                    Категория
                  </th>
                  <th class="table__header-cell">ед/изм</th>
                  <th class="table__header-cell">количество</th>
                  <th class="table__header-cell">цена</th>
                  <th class="table__header-cell">дисконт</th>
                  <th class="table__header-cell">ИТОГ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody class="table__body"></tbody>
            </table>
          </div>
          <div class="sub-panel"></div>
        </div>
      </div>
    </section>

    <div id="preloader"></div>

    <template id="modal-template">
      <div class="modal">
        <div class="modal-dialog">
          <div class="modal-panel-close">
            <a href="#" class="modal-close">
              <svg
                class="close-icon svg-box"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path d="m2 2 20 20M2 22 22 2" />
              </svg>
            </a>
          </div>
          <div class="modal-content-wrapper"></div>
        </div>
      </div>
    </template>

    <template id="modal-template-pic">
      <div class="title_pic"></div>
      <img src="image/prototype.jpg" alt="изображение товара отсутствует" />
    </template>

    <template id="modal-template-card">
      <div class="card">
        <div class="card_top">
          <h2 class="card__title"></h2>
          <div class="card__vendor-code vendor-code">
            <p class="vendor-code__wrapper">
              <span class="vendor-code__txt">id: </span
              ><span class="vendor-code__id"></span>
            </p>
          </div>
        </div>
        <form class="card__form" method="post">
          <fieldset class="card__fieldset">
            <label class="card__label card__label_name" for="title">
              <span class="card__text">Наименование</span>
              <input
                class="card__input"
                type="text"
                name="title"
                id="title"
                placeholder="вводите не менее трёх символов"
              />
            </label>
            <label class="card__label card__label_category" for="category">
              <span class="card__text">Категория</span>
              <select
                class="card__input"
                name="category"
                id="category"
              ></select>
            </label>
            <label class="card__label card__label_inwork" for="inwork">
              <span class="card__text">Статус</span>
              <select class="card__input" name="inwork" id="inwork">
                <option value="0">продажа</option>
                <option value="1">оформление</option>
              </select>
            </label>

            <label class="card__label card__label_price" for="price">
              <span class="card__text">Цена</span>
              <input class="card__input" type="text" name="price" id="price" />
            </label>

            <div class="card__label card__label_discount">
              <label class="card__text" for="discount">Дисконт</label>
              <div class="card__discount-wrapper">
                <div class="card__discount_txt">%</div>
                <input
                  class="card__input card__input_discount"
                  type="text"
                  name="discount"
                  id="discount"
                />
              </div>
            </div>

            <label class="card__label card__label_count" for="count">
              <span class="card__text">Количество</span>
              <input class="card__input" type="text" name="count" id="count" />
            </label>

            <label class="card__label card__label_units" for="units">
              <span class="card__text">Единицы измерения</span>
              <select class="card__input" name="units" id="units"></select>
            </label>

            <label class="card__total" for="total"
              >Итоговая стоимость:
              <output
                class="card__total-price"
                name="total"
                id="total"
              ></output>
            </label>

            <label
              class="card__label card__label_description"
              for="description"
            >
              <span class="card__text">Описание</span>
              <textarea
                class="card__input card__input_textarea"
                name="description"
                id="description"
              ></textarea>
              <div
                class="card__input card__input_textarea_eye"
                id="description_eye"
              ></div>
            </label>

            <label tabindex="0" for="image" class="card__label card__label_file"
              >Выбрать изображение
              <input
                class="card__file visually-hidden"
                tabindex="-1"
                type="file"
                name="image"
                id="image"
                accept=".jpg, .jpeg, .svg, .png"
              />
            </label>
            <div class="card__label_file-add" id="file-add">
              <img src="" alt="" />
            </div>
          </fieldset>

          <div class="card__footer">
            <button class="card__submit" type="submit">Добавить товар</button>
          </div>
        </form>
      </div>
    </template>
  </body>
</html>
